name: Predictive Maintenance ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install ML Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn xgboost datasets huggingface_hub mlflow joblib

    - name: Execute Machine Learning Pipeline (Data Prep & Model Building)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python train.py 
        
    - name: Automate and Push Code Updates to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        git commit -m "Automated CI/CD workflow: ML Pipeline execution and code updates" || echo "No changes to commit"
        git push origin main
